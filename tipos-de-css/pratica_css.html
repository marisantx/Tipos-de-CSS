<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Aula CSS - 1</title>
	<link rel="stylesheet" href="estilo.css">
</head>
<body><!-- height é uma altura automatica, border-radius é a borda aredondada, solid é a linha reta (não tracejada) 
		Não use tegs de estilização ex: <i>, <br>,
		class, id são seletores do html-->

	<div class="card">

		<div class="foto">
			<img 
				src="https://cdn-icons-png.flaticon.com/512/706/706830.png" alt="">
		</div>

		<div>
			<h1 class=titulo>
				Meu nome é: <span class=cor_destaque>Adriana</span>
			</h1>

			<p>
				Mensagem: <span class="cor_destaque estilo_fonte">A vida não é um morango!</span>
			</p>
		</div>
	</div>

	<div class="card">

		<div class="foto">
			<img style="width: 100%;  height: 100%; margin-top: 20px;"
				src="https://cdn-icons-png.flaticon.com/256/3681/3681928.png" alt="">
		</div>

		<div>
			<h1 class=titulo>
				Meu nome é: <span class="cor_destaque">Hugo</span> 
			</h1>

			<p>
				Mensagem: <span class="cor_destaque estilo_fonte"> Um dia é da caça, o outro é do caçador.</span> 
			</p>
		</div>
	</div>


</body>

</html>
